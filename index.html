<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Forever</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-dust: #e2b4bd;
            --text-main: #4a4a4a;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            /* Imagen de fondo */
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Corazones flotantes */
        .heart {
            position: fixed;
            top: -10%;
            font-size: 20px;
            color: rgba(226, 180, 189, 0.5);
            user-select: none;
            z-index: 2;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Tarjeta de cristal (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 45px 30px;
            width: 85%;
            max-width: 420px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 10;
            text-align: center;
            animation: cardAppear 2s ease-out;
            margin-top: 20px;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            color: #b5838d;
            margin: 0 0 10px 0;
        }

        .quote {
            font-style: italic;
            font-weight: 300;
            margin-bottom: 30px;
            line-height: 1.5;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .counter-section {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .label {
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #6d6875;
            font-weight: 600;
        }

        .timer {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .divider {
            font-size: 1.2rem;
            margin: 8px 0;
            color: #e5989b;
            opacity: 0.7;
        }

        /* Botón de Música */
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 50%;
