<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Forever</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-dust: #e2b4bd;
            --text-main: #4a4a4a;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            /* Imagen de fondo limpia */
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Corazones flotantes */
        .heart {
            position: fixed;
            top: -10%;
            font-size: 20px;
            color: rgba(226, 180, 189, 0.5);
            user-select: none;
            z-index: 2;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Tarjeta de cristal (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 45px 30px;
            width: 85%;
            max-width: 420px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 10;
            text-align: center;
            animation: cardAppear 2s ease-out;
            margin-top: 20px;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            color: #b5838d;
            margin: 0 0 10px 0;
        }

        .quote {
            font-style: italic;
            font-weight: 300;
            margin-bottom: 30px;
            line-height: 1.5;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .counter-section {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .label {
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #6d6875;
            font-weight: 600;
        }

        .timer {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .divider {
            font-size: 1.2rem;
            margin: 8px 0;
            color: #e5989b;
            opacity: 0.7;
        }

        /* Botón de Música Aesthetic */
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .music-btn:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body>

    <button class="music-btn" onclick="toggleMusic()" id="mBtn">🎵</button>
    <audio id="mySong" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-card">
        <h1>To My Everything</h1>
        
        <p class="quote">
            "Before you, I was nothing... <br> 
            and now I'm everything with you."
        </p>

        <div class="counter-section">
            <div class="label">The moment we met</div>
            <div id="met-timer" class="timer">...</div>
        </div>

        <div class="divider">❤</div>

        <div class="counter-section">
            <div class="label">The day my life began</div>
            <div id="dating-timer" class="timer">...</div>
        </div>
        
        <div style="font-size: 0.75rem; margin-top: 15px; opacity: 0.5;">
            Every second counts with you.
        </div>
    </div>

    <script>
        // Lógica de los Contadores
        function updateTimers() {
            const metDate = new Date('2025-08-20T02:00:00');
            const datingDate = new Date('2025-09-07T00:00:00');
            const now = new Date();

            function formatTime(start) {
                const diff = now - start;
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / (1000 * 60)) % 60);
                const s = Math.floor((diff / 1000) % 60);
                return `${d}d ${h}h ${m}m ${s}s`;
            }

            document.getElementById('met-timer').innerText = formatTime(metDate);
            document.getElementById('dating-timer').innerText = formatTime(datingDate);
        }

        // Lógica de la Música
        function toggleMusic() {
            const song = document.getElementById("mySong");
            const btn = document.getElementById("mBtn");
            if (song.paused) {
                song.play();
                btn.innerHTML = "⏸️";
            } else {
                song.pause();
                btn.innerHTML = "🎵";
            }
        }

        // Lógica de Corazones
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = Math.random() > 0.5 ? '❤' : '✨';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.2;
            heart.style.fontSize = Math.random() * 10 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }

        setInterval(updateTimers, 1000);
        setInterval(createHeart, 500);
        updateTimers();
    </script>
</body>
</html>
