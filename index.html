<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Forever</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-dust: #e2b4bd;
            --text-main: #4a4a4a;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Corazones y Partículas MÁS GRANDES */
        .heart {
            position: fixed;
            top: -15%;
            font-size: 40px; /* Tamaño aumentado */
            color: rgba(226, 180, 189, 0.6);
            user-select: none;
            z-index: 2;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(115vh) rotate(360deg); }
        }

        /* Tarjeta de cristal central */
        .glass-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 45px 30px;
            width: 85%;
            max-width: 420px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 10;
            text-align: center;
            animation: cardAppear 2s ease-out;
        }

        /* Marquito Polaroid abajo a la IZQUIERDA (MÁS GRANDE x2.5) */
        .polaroid-frame {
            position: fixed;
            bottom: 40px;
            left: 40px;
            background: white;
            padding: 15px 15px 50px 15px; /* Espacio inferior más grande estilo polaroid real */
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            transform: rotate(-5deg);
            z-index: 15;
            transition: all 0.5s ease;
            animation: cardAppear 2.5s ease-out;
        }

        .polaroid-frame:hover {
            transform: rotate(0deg) scale(1.02);
            z-index: 100;
        }

        .polaroid-frame img {
            width: 300px; /* Tamaño x2.5 aproximado */
            height: 300px;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            color: #b5838d;
            margin: 0 0 10px 0;
        }

        .quote {
            font-style: italic;
            font-weight: 300;
            margin-bottom: 30px;
            line-height: 1.5;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .counter-section {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .label {
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #6d6875;
            font-weight: 600;
        }

        .timer {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Botón de Música */
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(40px) rotate(-5deg); }
            to { opacity: 1; transform: translateY(0) rotate(-5deg); }
        }
    </style>
</head>
<body>

    <div class="polaroid-frame">
        <img src="foto.jpg" alt="Us">
    </div>

    <button class="music-btn" onclick="toggleMusic()" id="mBtn">🎵</button>
    <audio id="mySong" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-card">
        <h1>To My Everything</h1>
        <p class="quote">"Before you, I was nothing... <br> and now I'm everything with you."</p>

        <div class="counter-section">
            <div class="label">The moment we met</div>
            <div id="met-timer" class="timer">...</div>
        </div>

        <div style="font-size: 1.2rem; margin: 8px 0; color: #e5989b;">❤</div>

        <div class="counter-section">
            <div class="label">The day my life began</div>
            <div id="dating-timer" class="timer">...</div>
        </div>
    </div>

    <script>
        const song = document.getElementById("mySong");
        song.volume = 0.1; // Volumen bajo

        function updateTimers() {
            const metDate = new Date('2025-08-20T02:00:00');
            const datingDate = new Date('2025-09-07T00:00:00');
            const now = new Date();

            function formatTime(start) {
                const diff = now - start;
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / (1000 * 60)) % 60);
                const s = Math.floor((diff / 1000) % 60);
                return `${d}d ${h}h ${m}m ${s}s`;
            }
            document.getElementById('met-timer').innerText = formatTime(metDate);
            document.getElementById('dating-timer').innerText = formatTime(datingDate);
        }

        function toggleMusic() {
            const btn = document.getElementById("mBtn");
            if (song.paused) { song.play(); btn.innerHTML = "⏸️"; }
            else { song.pause(); btn.innerHTML = "🎵"; }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            // Alterna entre corazón y brillo grande
            heart.innerHTML = Math.random() > 0.5 ? '❤' : '✨';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 5 + 's';
            heart.style.opacity = Math.random() * 0.6 + 0.3;
            // Tamaño aleatorio para que no sean todos iguales de gigantes
            const size = Math.random() * 20 + 30; 
            heart.style.fontSize = size + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 7000);
        }

        setInterval(updateTimers, 1000);
        setInterval(createHeart, 600); // Aparecen un poco más lento para no saturar
        updateTimers();
    </script>
</body>
</html>
